# Alembic configuration file
# This file is read by `alembic` to configure migrations.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path — use empty for no modification
prepend_sys_path = .

# Timezone for file names
timezone = UTC

# Max length of migration slug
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
sourceless = false

# Version location (default: alembic/versions)
version_locations = %(here)s/alembic/versions

# The output encoding used when revision files are written
output_encoding = utf-8

# Database URL — overridden by env.py at runtime
sqlalchemy.url = postgresql+psycopg2://aegis:aegis_dev_password@localhost:5432/aegis_db

[post_write_hooks]
# Uncomment to auto-format migration files with ruff
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = check --select I --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
